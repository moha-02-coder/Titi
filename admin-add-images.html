<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter des images aux produits - Titi Golden Taste</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .admin-header h1 {
            color: #d4af37;
            margin-bottom: 10px;
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .action-btn {
            padding: 35px;
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .results {
            margin-top: 30px;
            padding: 35px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .results.show {
            display: block;
        }
        .results h3 {
            margin-top: 0;
            color: #333;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            padding: 15px;
            background: white;
            border-radius: 6px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #d4af37;
        }
        .stat-card .label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            color: #0f0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .loading {
            text-align: center;
            padding: 35px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-images"></i> Ajouter des images</h1>
            <p>Téléchargez automatiquement des images depuis internet pour vos produits et plats</p>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="btnProducts" onclick="addImages('products')">
                <i class="fas fa-shopping-bag"></i><br>
                Ajouter images produits
            </button>
            <button class="action-btn" id="btnMenu" onclick="addImages('menu')">
                <i class="fas fa-utensils"></i><br>
                Ajouter images menu
            </button>
        </div>

        <div class="results" id="results">
            <h3>Résultats</h3>
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="number" id="statUpdated">0</div>
                    <div class="label">Mis à jour</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="statSkipped">0</div>
                    <div class="label">Ignorés</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="statErrors">0</div>
                    <div class="label">Erreurs</div>
                </div>
            </div>
            <div class="output" id="output"></div>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Téléchargement en cours...</p>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        async function addImages(type) {
            const btnId = type === 'products' ? 'btnProducts' : 'btnMenu';
            const btn = document.getElementById(btnId);
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const output = document.getElementById('output');
            
            // Désactiver le bouton et afficher le chargement
            btn.disabled = true;
            loading.style.display = 'block';
            results.classList.remove('show');
            
            try {
                const response = await fetch(`${API_BASE_URL}/admin/add-images.php?type=${type}`);
                const data = await response.json();
                
                if (data.success) {
                    // Afficher les statistiques
                    if (data.stats) {
                        document.getElementById('statUpdated').textContent = data.stats.updated || 0;
                        document.getElementById('statSkipped').textContent = data.stats.skipped || 0;
                        document.getElementById('statErrors').textContent = data.stats.errors || 0;
                    }
                    
                    // Afficher la sortie
                    if (data.output) {
                        output.textContent = data.output;
                    }
                    
                    results.classList.add('show');
                } else {
                    alert('Erreur: ' + (data.message || 'Erreur inconnue'));
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de la connexion au serveur: ' + error.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
