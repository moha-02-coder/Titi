services:
  - type: web
    name: titi
    env: docker
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader 2>/dev/null || true
    startCommand: |
      php -S 0.0.0.0:$PORT -t .
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: titi
      - key: DB_USER
        value: root
      - key: DB_PASS
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://titi-golden-taste.onrender.com

  - type: pserv
    name: titi-websocket
    env: php
    plan: free
    startCommand: php -q backend/websocket-server/server.php
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: titi
      - key: DB_USER
        value: root
      - key: DB_PASS
        value: ""