services:
  # Service PHP principal
  - type: web
    name: titi-golden-taste
    env: php
    plan: free
    buildCommand: |
      # Installation des dépendances PHP si nécessaire
      composer install --no-dev --optimize-autoloader 2>/dev/null || true
    startCommand: |
      # Configuration du serveur PHP
      php -S 0.0.0.0:$PORT -t .
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DB_HOST
        fromDatabase:
          name: titi-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: titi-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: titi-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: titi-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: titi-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://titi-golden-taste.onrender.com

  # Service WebSocket (optionnel)
  - type: pserv
    name: titi-websocket
    env: php
    plan: free
    startCommand: php -q backend/websocket-server/server.php
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: titi-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: titi-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: titi-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: titi-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: titi-db
          property: password

databases:
  # Base de données PostgreSQL
  - name: titi-db
    databaseName: titi
    user: titi_user
    plan: free
